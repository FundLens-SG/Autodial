button{font-family:inherit;cursor:pointer;border:none;transition:all .15s}
.mono{font-family:'JetBrains Mono',monospace}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.7}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(251,191,36,.3)}50%{box-shadow:0 0 40px rgba(251,191,36,.6)}}

<script>
var SB_URL='https://mgbxxwoasrwlraffcvab.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYnh4d29hc3J3bHJhZmZjdmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIzMjMsImV4cCI6MjA5MDM1ODMyM30.kJoq_dded4cmW56ymY3NmvmhNxYKFKrwOxbSJvBIfc4',CREATOR_EMAILS=['chungakwanc@gmail.com'];
var _SB=null,_user=null,_prof=null;window._role='admin';

function isCreator(email){return CREATOR_EMAILS.indexOf((email||'').toLowerCase())>=0}

function pickRole(r){
  window._role=r;
  var ba=document.getElementById('btn-admin'),bm=document.getElementById('btn-main');
  ba.style.background=r==='admin'?'var(--adim)':'var(--bg3)';

try{if(window.supabase)_SB=window.supabase.createClient(SB_URL,SB_KEY,{auth:{storageKey:'autodial-auth',autoRefreshToken:true,persistSession:true,detectSessionInUrl:false,flowType:'implicit'}})}catch(e){}
function authMsg(t,type){var e=document.getElementById('auth-message');e.style.display='block';e.style.background=type==='i'?'var(--gdim)':'var(--rdim)';e.style.color=type==='i'?'var(--green)':'var(--red)';e.style.border='1px solid '+(type==='i'?'rgba(52,211,153,.2)':'rgba(239,68,68,.2)');e.textContent=t}
function authClear(){document.getElementById('auth-message').style.display='none'}
function authShow(v){authClear();['login','signup','pending'].forEach(s=>{var el=document.getElementById('auth-'+s);if(el)el.style.display=s===v?'':'none'})}
function toast(m,t){var e=document.createElement('div');e.className='toast t-'+(t||'ok');e.textContent=m;document.getElementById('toast-area').appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},3000)}

async function authLogin(){
  authClear();
  var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pass').value;
  if(!e||!p)return authMsg('Enter email and password');
  if(!window._role)return authMsg('Select a role');
    return authMsg('Only authorized managers can log in as Main');
  }
  authMsg('Signing in…','i');
  try{
    var r=await _SB.auth.signInWithPassword({email:e,password:p});
    if(r.error)return authMsg(r.error.message);
    _SB.auth.getSession().then(s=>{_user=s?.data?.session?.user||{email:e}});
    _prof={email:e,role:window._role};
    // Creator always approved
    if(isCreator(e)){
      authGrant();return;
    }
    // Others need Creator approval
    try{
      var sess=await _SB.auth.getSession();
      if(sess.data?.session?.user){
        var pr=await _SB.from('profiles').select('approved').eq('id',sess.data.session.user.id).single();
        if(pr.data&&!pr.data.approved){authShow('pending');return}
      }
    }catch(pe){}
    authGrant();
  }catch(err){authMsg(err.message)}
}
async function authSignup(){
  authClear();
  var n=document.getElementById('auth-sname').value.trim(),e=document.getElementById('auth-semail').value.trim(),p=document.getElementById('auth-spass').value;
  if(!n||!e||!p)return authMsg('Fill all fields');
  if(!window._role)return authMsg('Select Admin or Main');
  if(p.length<6)return authMsg('Password must be 6+ characters');
  authMsg('Creating account…','i');
  try{
    var r=await _SB.auth.signUp({email:e,password:p,options:{data:{full_name:n}}});

      var creator=isCreator(e);

        id:r.data.user.id,email:e,full_name:n,
        approved:creator,
        role:creator?window._role:window._role, // store requested role
        autodial_role:window._role // explicit autodial role
      }).catch(function(){});
      if(creator){_user=r.data.user;_prof={email:e,full_name:n,approved:true,role:window._role};authGrant();return}
    }
    authMsg('Account created! Awaiting Creator approval.','i');
    setTimeout(function(){authShow('pending')},1500);
  }catch(err){authMsg(err.message)}
}
async function authLogout(){try{await _SB.auth.signOut()}catch(e){}_user=null;_prof=null;localStorage.removeItem('autodial_role');window._mounted=false;document.getElementById('auth-gate').style.display='flex';document.getElementById('root').innerHTML='';authShow('login')}
window.authLogout=authLogout;
function authGrant(){document.getElementById('auth-gate').style.display='none';window._user=_user;window._prof=_prof;localStorage.setItem('autodial_role',window._role);initSync();if(!window._mounted){window._mounted=true;initApp()}else{document.getElementById('root').innerHTML='';initApp()}}

// ══════════════════════════════════════════
//  SUPABASE REALTIME SYNC — PC ↔ Phone
// ══════════════════════════════════════════
var _channel=null;
var _syncCallbacks=[];

function initSync(){
  if(!_SB||!_user?.id)return;
  if(_channel){try{_SB.removeChannel(_channel)}catch(e){}}
  var room='autodial-'+_user.id;
  _channel=_SB.channel(room);
  _channel.on('broadcast',{event:'sync'},function(msg){
    var d=msg.payload;if(!d)return;
    // Ignore our own broadcasts (check device id)
    if(d._device===window._deviceId)return;
    console.log('[Sync] Received:',d.type);
    _syncCallbacks.forEach(function(cb){cb(d)});
  });
  _channel.subscribe(function(status){
    if(status==='SUBSCRIBED')console.log('[Sync] Connected to room:',room);
  });
  // Unique device ID to filter own messages
  if(!window._deviceId)window._deviceId=Math.random().toString(36).slice(2);
}

window.syncSend=function(type,payload){
  if(!_channel)return;
  _channel.send({type:'broadcast',event:'sync',payload:{...payload,type:type,_device:window._deviceId,_ts:Date.now()}});
};
window.onSync=function(cb){_syncCallbacks.push(cb);return function(){_syncCallbacks=_syncCallbacks.filter(function(c){return c!==cb})}};

// ═══ Gender Detection ═══
window.detectGender=function(lead){
  // 1. Check gender field directly
  if(lead.gender){var g=lead.gender.toLowerCase();if(/^(m|male|mr)$/i.test(g))return 'male';if(/^(f|female|mrs|ms|miss|mdm|madam)$/i.test(g))return 'female'}
  // 2. Check name prefix
  var n=(lead.name||'').trim();
  if(/^(mr\.?|encik|en\.?)\s/i.test(n))return 'male';
  if(/^(mrs\.?|ms\.?|miss\.?|mdm\.?|madam|puan|cik)\s/i.test(n))return 'female';
  return null; // unknown
};

// ═══ Age Parsing — handles "51 to 60", "55", "51-60" ═══
window.parseAgeRange=function(ageStr){
  if(!ageStr)return null;
  var s=String(ageStr).trim();
  // Direct number
  var direct=parseInt(s);if(!isNaN(direct)&&s.length<=3)return{min:direct,max:direct};

  var m=s.match(/(\d+)\s*(?:to|-|–)\s*(\d+)/i);

window.ageOverlaps=function(leadAge,filterMin,filterMax){
  var r=parseAgeRange(leadAge);if(!r)return true; // can't determine, include
  // Check if ranges overlap
  return r.max>=filterMin&&r.min<=filterMax;
};

// ═══ Smart Queue — skip NI, time-aware CB, filters ═══
window.getNextDialable=function(leads,afterIdx,filters){
  var f=filters||{};
  var now=new Date();
  for(var i=(afterIdx>=0?afterIdx+1:0);i<leads.length;i++){
    var l=leads[i];
    // Skip NI — permanently done
    if(l.status==='ni')continue;
    // Skip Set — already converted
    if(l.status==='set')continue;
    // Skip NP with 5+ — auto NI
    if(l.status==='np'&&l.npCount>=5)continue;
    // Filter: skip ALL NPs
    if(f.skipAllNP&&l.status==='np')continue;
    // CB — only dial if within 15 min of scheduled time
    if(l.status==='cb'){
      if(!l.cbDate||!l.cbTime){continue}
      try{
        var cbDateTime=new Date(l.cbDate+'T'+l.cbTime);
        var diffMin=(cbDateTime-now)/60000;
        if(diffMin>15||diffMin<-5)continue;
      }catch(e){continue}
    }
    // Filter: gender
    if(f.genderFilter&&f.genderFilter!=='all'){
      var g=detectGender(l);
      if(g&&g!==f.genderFilter)continue; // skip mismatched, but include unknown
    }
    // Filter: age range
    if(f.ageFilter&&(f.ageMin||f.ageMax)){
      var amin=f.ageMin||0,amax=f.ageMax||999;
      if(l.age&&!ageOverlaps(l.age,amin,amax))continue;
    }
    // Pending or eligible — dialable
    return i;
  }
  return -1;
};
