<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#07080d;--bg2:#0d1117;--bg3:#161b22;--bg4:#21262d;
--text:#e6edf3;--text2:#8b949e;--text3:#484f58;
--border:#21262d;--border2:#30363d;
--accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;--adim:rgba(99,102,241,.1);
--green:#3fb950;--gdim:rgba(63,185,80,.1);
--red:#f85149;--rdim:rgba(248,81,73,.1);
--blue:#58a6ff;--bdim:rgba(88,166,255,.1);
--amber:#d29922;--amdim:rgba(210,153,34,.1);
--gold:#f0b429;--golddim:rgba(240,180,41,.1);
--glass:rgba(13,17,23,.7);--glow:0 0 30px rgba(99,102,241,.15)
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:0}
input,select{font-family:inherit;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;font-size:14px;outline:none;width:100%;box-sizing:border-box;transition:all .2s;backdrop-filter:blur(10px)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
input::placeholder{color:var(--text3)}
button{font-family:inherit;cursor:pointer;border:none;transition:all .2s;border-radius:12px}
button:active{transform:scale(.97)}
.mono{font-family:'JetBrains Mono',monospace}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.7}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{box-shadow:var(--glow)}50%{box-shadow:0 0 60px rgba(99,102,241,.25)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-200px) rotate(720deg);opacity:0}}
@keyframes celebrate{0%{transform:scale(.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes firePulse{0%,100%{text-shadow:0 0 10px rgba(240,180,41,.5)}50%{text-shadow:0 0 30px rgba(240,180,41,.8)}}
@keyframes borderGlow{0%,100%{border-color:rgba(99,102,241,.3)}50%{border-color:rgba(99,102,241,.6)}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;backdrop-filter:blur(20px);transition:all .2s}
.card:hover{border-color:var(--border2)}
.pill{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.3px}
.glass{background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.05)}
.glow-border{animation:borderGlow 3s infinite}
.fi{animation:fadeIn .3s ease-out}

/* Auth */
#auth-gate{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;

.bs{width:100%;padding:12px;background:transparent;color:var(--text2);border:1px solid var(--border2)!important;font-size:13px;font-weight:600;margin-top:8px}
.tw{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99999;pointer-events:none}
.toast{padding:12px 20px;border-radius:12px;font-size:12px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:fadeIn .25s;margin-top:6px;backdrop-filter:blur(20px)}

.t-err{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.t-info{background:var(--adim);border:1px solid rgba(99,102,241,.3);color:var(--accent2)}

        <button id="btn-main" data-role="main" style="flex:1;padding:14px;border-radius:14px;background:transparent;color:var(--text3);font-size:14px;font-weight:700;border:2px solid transparent;cursor:pointer">👔 Main</button>

<script>

var SB_URL='https://mgbxxwoasrwlraffcvab.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nYnh4d29hc3J3bHJhZmZjdmFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODIzMjMsImV4cCI6MjA5MDM1ODMyM30.kJoq_dded4cmW56ymY3NmvmhNxYKFKrwOxbSJvBIfc4';

function authMsg(t,type){var e=document.getElementById('auth-message');e.style.display='block';e.style.background=type==='i'?'var(--gdim)':'var(--rdim)';e.style.color=type==='i'?'var(--green)':'var(--red)';e.style.border='1px solid '+(type==='i'?'rgba(63,185,80,.2)':'rgba(248,81,73,.2)');e.textContent=t}

async function authLogin(){authClear();var e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pass').value;
  if(!e||!p)return authMsg('Enter email and password');if(!window._role)return authMsg('Select a role');

  try{var r=await _SB.auth.signInWithPassword({email:e,password:p});if(r.error)return authMsg(r.error.message);
    _SB.auth.getSession().then(function(s){_user=s?.data?.session?.user||{email:e}});_prof={email:e,role:window._role};
    if(isCreator(e)){authGrant();return}
    try{var sess=await _SB.auth.getSession();if(sess.data?.session?.user){var pr=await _SB.from('profiles').select('approved').eq('id',sess.data.session.user.id).single();if(pr.data&&!pr.data.approved){authShow('pending');return}}}catch(pe){}
    authGrant()}catch(err){authMsg(err.message)}}

async function authSignup(){authClear();var n=document.getElementById('auth-sname').value.trim(),e=document.getElementById('auth-semail').value.trim(),p=document.getElementById('auth-spass').value;
  if(!n||!e||!p)return authMsg('Fill all fields');if(p.length<6)return authMsg('6+ chars');

    authMsg('Created! Awaiting approval.','i');setTimeout(function(){authShow('pending')},1500)}catch(err){authMsg(err.message)}}

async function authLogout(){try{await _SB.auth.signOut()}catch(e){}_user=null;_prof=null;localStorage.removeItem('autodial_role');window._mounted=false;document.getElementById('auth-gate').style.display='flex';document.getElementById('root').innerHTML='';authShow('login')}
window.authLogout=authLogout;

function authGrant(){document.getElementById('auth-gate').style.display='none';window._user=_user;window._prof=_prof;localStorage.setItem('autodial_role',window._role);initSync();if(!window._mounted){window._mounted=true;initApp()}else{document.getElementById('root').innerHTML='';initApp()}}

async function authCheck(){try{if(!_SB){authGrant();return}var s=await _SB.auth.getSession();if(!s.data?.session){document.getElementById('auth-gate').style.display='flex';return}
  _user=s.data.session.user;var p=await _SB.from('profiles').select('*').eq('id',_user.id).single();if(p.data)_prof=p.data;
  var sr=localStorage.getItem('autodial_role');if(sr){window._role=sr;authGrant()}else{document.getElementById('auth-gate').style.display='flex'}}catch(e){document.getElementById('auth-gate').style.display='flex'}}

if(_SB)authCheck();else{document.getElementById('auth-gate').style.display='none';_user={id:'local'};_prof={full_name:'User'};setTimeout(function(){if(!window._mounted){window._mounted=true;initApp()}},100)}

// Bind auth buttons
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('btn-admin')?.addEventListener('click',function(){pickRole('admin')});
  document.getElementById('btn-main')?.addEventListener('click',function(){pickRole('main')});
  document.getElementById('btn-signin')?.addEventListener('click',function(){authLogin()});
  document.getElementById('btn-gosignup')?.addEventListener('click',function(){authShow('signup')});
  document.getElementById('btn-signup')?.addEventListener('click',function(){authSignup()});
  document.getElementById('btn-goback')?.addEventListener('click',function(){authShow('login')});
  document.getElementById('btn-pendout')?.addEventListener('click',function(){authLogout()});
  document.getElementById('auth-pass')?.addEventListener('keydown',function(e){if(e.key==='Enter')authLogin()});
});

// ══════ REALTIME SYNC ══════
var _channel=null,_syncCbs=[];
function initSync(){if(!_SB||!_user?.id)return;if(_channel)try{_SB.removeChannel(_channel)}catch(e){}

  _channel.on('broadcast',{event:'sync'},function(msg){var d=msg.payload;if(!d||d._dev===window._devId)return;_syncCbs.forEach(function(cb){cb(d)})});
  _channel.subscribe();if(!window._devId)window._devId=Math.random().toString(36).slice(2)}
window.syncSend=function(t,p){if(_channel)_channel.send({type:'broadcast',event:'sync',payload:{...p,type:t,_dev:window._devId,_ts:Date.now()}})};
window.onSync=function(cb){_syncCbs.push(cb);return function(){_syncCbs=_syncCbs.filter(function(c){return c!==cb})}};

window.detectGender=function(l){if(l.gender){var g=l.gender.toLowerCase();if(/^(m|male|mr)$/i.test(g))return'male';if(/^(f|female|mrs|ms|miss|mdm)$/i.test(g))return'female'}var n=(l.name||'');if(/^(mr\.?|encik)\s/i.test(n))return'male';if(/^(mrs\.?|ms\.?|miss|mdm)\s/i.test(n))return'female';return null};
window.parseAgeRange=function(a){if(!a)return null;var s=String(a).trim(),d=parseInt(s);if(!isNaN(d)&&s.length<=3)return{min:d,max:d};var m=s.match(/(\d+)\s*(?:to|-)\s*(\d+)/i);return m?{min:+m[1],max:+m[2]}:null};
window.getNextDialable=function(leads,after,f){f=f||{};var now=new Date();for(var i=(after>=0?after+1:0);i<leads.length;i++){var l=leads[i];
  if(l.status==='ni'||l.status==='set')continue;if(l.status==='np'&&l.npCount>=5)continue;if(f.skipAllNP&&l.status==='np')continue;
  if(l.status==='cb'){if(!l.cbDate||!l.cbTime)continue;try{var diff=(new Date(l.cbDate+'T'+l.cbTime)-now)/6e4;if(diff>15||diff<-5)continue}catch(e){continue}}
  if(f.genderFilter&&f.genderFilter!=='all'){var g=detectGender(l);if(g&&g!==f.genderFilter)continue}
  if(f.ageFilter&&f.ageMin){var ar=parseAgeRange(l.age);if(ar&&(ar.max<(+f.ageMin)||ar.min>(+f.ageMax||999)))continue}
  return i}return-1};

  const applyOutcome=useCallback((status,extra={})=>{const idx=curIdx;

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8}}>
              <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:2}}>Session(h)</label>
                <input type="number" value={ac.sessionDur} onChange={e=>setAdminConfigs(p=>({...p,[em]:{...p[em],sessionDur:+e.target.value||5}}))} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
              <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:2}}>Appts Bar</label>
                <input type="number" min="1" value={ac.mThresh} onChange={e=>{const v=+e.target.value;if(v<0){toast('No negatives','err');return}setAdminConfigs(p=>({...p,[em]:{...p[em],mThresh:v||2}}))}} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
              <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:2}}>Bonus Bar</label>
                <input type="number" min="1" value={ac.nThresh} onChange={e=>{const v=+e.target.value;if(v<0){toast('No negatives','err');return}if(v<(ac.mThresh||2)){toast('Bonus Bar must be ≥ Appts Bar','err');return}setAdminConfigs(p=>({...p,[em]:{...p[em],nThresh:v||4}}))}} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
              <div><label style={{fontSize:9,color:'var(--gold)',fontWeight:700,display:'block',marginBottom:2}}>Bonus ×</label>
                <input type="number" min="1" step="0.1" value={ac.bonusMult||1.5} onChange={e=>{const v=parseFloat(e.target.value);if(v<1){toast('Must be ≥ 1×','err');return}setAdminConfigs(p=>({...p,[em]:{...p[em],bonusMult:v}}))}} style={{fontSize:12,textAlign:'center',padding:'8px',borderColor:'rgba(240,180,41,.3)'}}/></div>
              <div><label style={{fontSize:9,color:'var(--accent2)',fontWeight:700,display:'block',marginBottom:2}}>Timesheet Sheet ID</label>
                <input value={ac.timesheetId||''} onChange={e=>setAdminConfigs(p=>({...p,[em]:{...p[em],timesheetId:e.target.value.trim()}}))} placeholder="Google Sheet ID" style={{fontSize:11,padding:'8px'}}/></div>
            </div>
            <div style={{marginBottom:6}}><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:2}}>Invoice Name</label>
              <input value={ac.bizName||''} onChange={e=>setAdminConfigs(p=>({...p,[em]:{...p[em],bizName:e.target.value}}))} placeholder="Business or full name" style={{fontSize:12,padding:'8px'}}/></div>
            <div style={{marginBottom:6}}><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:2}}>PayNow Number</label>
              <input value={ac.payNow||''} onChange={e=>setAdminConfigs(p=>({...p,[em]:{...p[em],payNow:e.target.value}}))} placeholder="+65 9xxx xxxx" style={{fontSize:12,padding:'8px'}}/></div>
            <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:2}}>Assigned Sheet IDs</label>
              <input value={ac.sheets||''} onChange={e=>setAdminConfigs(p=>({...p,[em]:{...p[em],sheets:e.target.value}}))} placeholder="Sheet IDs (comma-separated)" style={{fontSize:12,padding:'8px'}}/></div>
          </div>}
        </div>)}
        {!Object.keys(adminConfigs).length&&<p style={{fontSize:11,color:'var(--text3)',textAlign:'center',padding:8}}>No custom configs. All admins use defaults.</p>}
      </div>}

      {role==='admin'&&<div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:8,color:'var(--accent2)'}}>💳 Payment Details</h3>
        <div style={{marginBottom:8}}><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:3}}>Name (for invoice)</label>
        <input value={localStorage.getItem('ad_bizname')||''} onChange={e=>localStorage.setItem('ad_bizname',e.target.value)} placeholder="Your name or business"/></div>
        <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:700,display:'block',marginBottom:3}}>PayNow Number</label>
        <input value={localStorage.getItem('ad_paynow')||''} onChange={e=>localStorage.setItem('ad_paynow',e.target.value)} placeholder="+65 9xxx xxxx"/></div>
      </div>}

      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:6}}>Google</h3>
        <p style={{fontSize:11,color:gOk?'var(--green)':'var(--text3)',fontWeight:600,marginBottom:8}}>{gOk?'✓ Connected':'Not connected'}</p>
        <button onClick={connectG} style={{padding:'10px 18px',borderRadius:10,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>{gOk?'Reconnect':'Connect'}</button>
      </div>

      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:6,color:'#4285f4'}}>🔵 Gemini AI</h3>
        <input value={localStorage.getItem('autodial_gemini')||''} onChange={e=>localStorage.setItem('autodial_gemini',e.target.value.trim())} placeholder="AIza…" className="mono" style={{fontSize:12,marginBottom:8}}/>
        <button onClick={()=>{const k=geminiKey();if(!k)return toast('No key','err');toast('Key saved')}} style={{padding:'8px 14px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>Save</button>
      </div>

      <button onClick={()=>{if(confirm('Sign out?'))authLogout()}} style={{width:'100%',padding:'14px',background:'transparent',border:'1px solid var(--border2)',color:'var(--text3)',fontSize:13,fontWeight:600}}>Sign Out</button>
    </div>}

    {/* CB Modal */}
    {showCb&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowCb(false)}>
      <div onClick={e=>e.stopPropagation()} className="glass" style={{width:'100%',maxWidth:480,borderRadius:'20px 20px 0 0',padding:'24px 20px 32px'}}>
        <h3 style={{margin:'0 0 14px',fontSize:17,fontWeight:800,color:'#f1f5f9'}}>Schedule Callback</h3>
        <input type="date" value={cbDate} onChange={e=>setCbDate(e.target.value)} style={{marginBottom:10,colorScheme:'dark'}}/>
        <input type="time" value={cbTime} onChange={e=>setCbTime(e.target.value)} style={{marginBottom:16,colorScheme:'dark'}}/>
        <button onClick={()=>{if(!cbDate||!cbTime)return;handleOutcome('cb',{cbDate,cbTime});setShowCb(false)}} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,var(--blue),#2563eb)',color:'#fff',fontSize:14,fontWeight:700}}>📅 Set CB</button>
      </div>
    </div>}

    {/* Appt Modal */}
    {showAppt&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowAppt(false)}>
      <div onClick={e=>e.stopPropagation()} className="glass" style={{width:'100%',maxWidth:480,borderRadius:'20px 20px 0 0',padding:'24px 20px 32px'}}>
        <h3 style={{margin:'0 0 6px',fontSize:17,fontWeight:800,color:'var(--green)'}}>✓ Appointment Set!</h3>
        <p style={{margin:'0 0 14px',fontSize:12,color:'var(--text3)'}}>Add to Google Calendar?</p>
        <input type="date" value={apptDate} onChange={e=>setApptDate(e.target.value)} style={{marginBottom:8,colorScheme:'dark'}}/>
        <input type="time" value={apptTime} onChange={e=>setApptTime(e.target.value)} style={{marginBottom:8,colorScheme:'dark'}}/>
        <input value={apptInvite} onChange={e=>setApptInvite(e.target.value)} placeholder="Invite emails (comma sep)" style={{marginBottom:14}}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={async()=>{if(!apptDate||!apptTime)return;try{const s=new Date(apptDate+'T'+apptTime);await gCal.create('Appt: '+(cur?.name||''),cur?.phone||'',s.toISOString(),new Date(s.getTime()+36e5).toISOString(),apptInvite?apptInvite.split(',').map(s=>s.trim()):[]); toast('Event created!')}catch(e){toast(e.message,'err')}setShowAppt(false)}} style={{flex:1,padding:'14px',background:'linear-gradient(135deg,var(--green),#059669)',color:'#fff',fontSize:14,fontWeight:700}}>📅 Create</button>
          <button onClick={()=>setShowAppt(false)} style={{padding:'14px 20px',background:'var(--bg3)',color:'var(--text3)',fontSize:14}}>Skip</button>
        </div>
      </div>
    </div>}
  </div>);
}

function initApp(){ReactDOM.createRoot(document.getElementById('root')).render(<App/>)}
window.initApp=initApp;
</script>
</body>
</html>
