    clearTimeout(syncTimeout.current);
    syncTimeout.current=setTimeout(()=>{
      syncSend('fullSync',{leads,cfg:{sheetId:cfg.sheetId,sheetTab:cfg.sheetTab,delay:cfg.delay},curIdx,phase,running,session,countdown,...extra});
    },300);
  },[leads,cfg,curIdx,phase,running,session,countdown]);

  // Auto-broadcast when leads or key state changes
  const prevLeadsRef=useRef(leads);
  useEffect(()=>{
    if(leads!==prevLeadsRef.current){prevLeadsRef.current=leads;broadcastState()}
  },[leads,broadcastState]);
  useEffect(()=>{broadcastState()},[running,phase,curIdx]);

  // Session timer
  useEffect(()=>{
    if(session&&!session.ended){timerRef.current=setInterval(()=>setElapsed(Math.floor((Date.now()-session.startTime)/1000)),1000);return()=>clearInterval(timerRef.current)}
  },[session]);

  const pending=leads.filter(l=>l.status==='pending'||l.status==='cb');
  const cur=curIdx>=0&&curIdx<leads.length?leads[curIdx]:null;
  const progress=leads.length?Math.round((leads.filter(l=>l.status!=='pending').length/leads.length)*100):0;
  const hasGender=leads.some(l=>detectGender(l)!==null);
  const hasAge=leads.some(l=>l.age);
  const tier=getTier(totalSets);const nextTier=getNextTier(totalSets);
  const userName=window._prof?.full_name||window._prof?.email||'User';
  const hourlyRate=myCfg.payRates[tier.idx]||myCfg.payRates[0];

  const dial=useCallback(ph=>{
    if(isMob)window.location.href=`tel:${ph.replace(/[^+\d]/g,'')}`;
    syncSend('dial',{phone:ph});
  },[]);

  // ─── Cross-device sync listener ───
  useEffect(()=>{
    const unsub=onSync((data)=>{
      // Full state sync — covers leads loaded, tabs changed, status changes, everything
      if(data.type==='fullSync'){
        if(data.leads)setLeads(data.leads);
        if(data.cfg){
          setCfg(prev=>({...prev,sheetId:data.cfg.sheetId||prev.sheetId,sheetTab:data.cfg.sheetTab||prev.sheetTab,delay:data.cfg.delay||prev.delay}));
        }
        if(data.curIdx!==undefined)setCurIdx(data.curIdx);
        if(data.phase)setPhase(data.phase);
        if(data.running!==undefined)setRunning(data.running);
        if(data.session)setSession(data.session);
        if(data.countdown!==undefined)setCountdown(data.countdown);
      }
      // Direct dial command — phone auto-triggers
      if(data.type==='dial'&&isMob){
        setTimeout(()=>{window.location.href=`tel:${data.phone.replace(/[^+\d]/g,'')}`},500);
      }
      if(data.type==='start'){
        if(data.leads)setLeads(data.leads);
        setCurIdx(data.curIdx);setRunning(true);setPhase(data.phase||'calling');
        setSession(data.session);setTab('dial');
        if(isMob&&data.phone){
          setTimeout(()=>{window.location.href=`tel:${data.phone.replace(/[^+\d]/g,'')}`},800);
        }
      }
      if(data.type==='pause'){setRunning(false);setPhase('idle')}
      if(data.type==='end'){setSession(data.session);setRunning(false);setPhase('idle')}
    });
    return unsub;
  },[]);

  const syncSheet=useCallback(async(lead,st)=>{
    if(!cfg.sheetId||lead.statusCol===-1||!lead.sheetRow||!localStorage.getItem('ad_gt'))return;
    try{const col=String.fromCharCode(65+lead.statusCol);let v=st.toUpperCase();if(st==='np')v=`NP x${(lead.npCount||0)+1}`;if(st==='cb')v=`CB ${lead.cbDate||''} ${lead.cbTime||''}`.trim();if(st==='set')v='appt set';await gSheets.put(cfg.sheetId,`${cfg.sheetTab||'Sheet1'}!${col}${lead.sheetRow}`,v)}catch(e){}
  },[cfg]);

  // ─── Start Session (Admin) ───
  const startSession=()=>{
    setSession({startTime:Date.now(),dialed:0,np:0,ni:0,cb:0,sets:0,ended:false});
    setElapsed(0);
    toast('Session started! Let\'s go! 🔥');
  };
  const endSession=()=>{
    if(!session)return;
    const s={...session,ended:true,endTime:Date.now(),elapsed};
    const fullSessionEarned=s.sets>=myCfg.mThresh;
    const bonusEarned=s.sets>=myCfg.nThresh;
    const hours=fullSessionEarned?myCfg.sessionDur:(elapsed/3600);
    const pay=hours*hourlyRate*(bonusEarned?1.5:1);
    s.pay=pay;s.fullSession=fullSessionEarned;s.bonus=bonusEarned;s.hourlyRate=hourlyRate;s.tier=tier.label;
    setSession(s);
    setSessionLog(p=>[s,...p]);
    setRunning(false);setPhase('idle');clearTimeout(cdRef.current);
    syncSend('end',{session:s});
    if(localStorage.getItem('ad_gt')){
      gTimesheet.appendSession(s,userName,cfg).then(()=>toast('Timesheet updated ✓')).catch(()=>{});
    }
  };

  // ─── Outcome ───
  const applyOutcome=useCallback((status,extra={})=>{
    const idx=curIdx;
    let updatedLeads=null;
    setLeads(prev=>{
      const next=prev.map((l,i)=>{
        if(i!==idx)return l;const now=new Date().toLocaleString();let u={...l,calledAt:now,...extra};
        if(status==='np'){const wasCb=l.status==='cb';const nc=(l.npCount||0)+1;u.npCount=nc;u.status=nc>=5?'ni':'np';if(wasCb&&l.cbDate){u.cbHistory=[...(l.cbHistory||[]),{date:`${l.cbDate} ${l.cbTime}`,result:'NP'}]}syncSheet(u,nc>=5?'ni':'np')}
        else if(status==='cb'){u.status='cb';u.cbDate=extra.cbDate||'';u.cbTime=extra.cbTime||'';syncSheet(u,'cb')}
        else if(status==='set'){u.status='set';syncSheet(u,'set')}
        else if(status==='ni'){u.status='ni';syncSheet(u,'ni')}
        else u.status=status;
        return u;
      });
      updatedLeads=next;
      return next;
    });
    // Update session stats
    if(session&&!session.ended){
      setSession(prev=>{
        const s={...prev,dialed:prev.dialed+1};
        if(status==='np')s.np=prev.np+1;if(status==='ni')s.ni=prev.ni+1;if(status==='cb')s.cb=prev.cb+1;
        if(status==='set'){
          s.sets=prev.sets+1;
          const newTotal=totalSets+1;setTotalSets(newTotal);
          if(s.sets===myCfg.mThresh){
            setConfetti(true);setTimeout(()=>setConfetti(false),3000);
            setMilestone({title:'FULL SESSION EARNED! 🎉',sub:`You hit ${myCfg.mThresh} appointments! Your full ${myCfg.sessionDur}-hour session is now logged.\n\nBut why stop? Push for ${myCfg.nThresh} appts to unlock the 1.5× BONUS!`,emoji:'🏆'});
          }else if(s.sets===myCfg.nThresh){
            setConfetti(true);setTimeout(()=>setConfetti(false),4000);
            setMilestone({title:'1.5× BONUS UNLOCKED! 💰',sub:`INCREDIBLE! ${myCfg.nThresh} appointments! Your entire session pay is now multiplied by 1.5×!\n\nYou're on FIRE — keep going!`,emoji:'🔥'});
          }
          if(TIERS.some(t=>t.min===newTotal)){
            setTimeout(()=>{setConfetti(true);setTimeout(()=>setConfetti(false),3000);setMilestone({title:'TIER PROMOTION! 🚀',sub:`You've reached ${getTier(newTotal).label}!\nYour hourly rate is now $${myCfg.payRates[getTier(newTotal).idx]}/hr!`,emoji:'⭐'})},1500);
          }
        }
        return s;
      });
    }
  },[curIdx,session,totalSets,cfg,syncSheet]);

  const moveNext=useCallback(()=>{
    setLeads(prev=>{
      const n=getNextDialable(prev,curIdx,filters);
      if(n===-1){setRunning(false);setPhase('idle');setCurIdx(-1);
        syncSend('outcome',{leads:prev,curIdx:-1,phase:'idle',running:false,session});
        return prev}
      setCurIdx(n);setPhase('waiting');setCountdown(cfg.delay);
      // Broadcast so other device knows what's next
      setTimeout(()=>{syncSend('outcome',{leads:prev,curIdx:n,phase:'waiting',running:true,session,countdown:cfg.delay})},100);
      return prev;
    });
  },[curIdx,cfg.delay,session]);

  const handleOutcome=useCallback((status,extra={})=>{
    if(status==='set'){applyOutcome(status,extra);setShowAppt(true);setApptDate('');setApptTime('');setApptInvite('');setTimeout(moveNext,150);return}
    applyOutcome(status,extra);setTimeout(moveNext,150);
  },[applyOutcome,moveNext]);

  useEffect(()=>{
    if(phase==='waiting'&&countdown>0&&running){cdRef.current=setTimeout(()=>setCountdown(c=>c-1),1000);return()=>clearTimeout(cdRef.current)}
    if(phase==='waiting'&&countdown===0&&running&&cur){
      setPhase('calling');dial(cur.phone);
    }
  },[phase,countdown,running,cur,dial]);

  const startDial=()=>{
    if(!session||session.ended)startSession();
    const f=getNextDialable(leads,-1,filters);
    if(f===-1){toast('No eligible leads','err');return}
    setCurIdx(f);setRunning(true);setPhase('calling');setTab('dial');
    const phone=leads[f].phone;
    setTimeout(()=>dial(phone),500);
    // Broadcast start so phone auto-dials
    syncSend('start',{curIdx:f,phase:'calling',session:{startTime:Date.now(),dialed:0,np:0,ni:0,cb:0,sets:0,ended:false},phone,leads});
  };
  const pauseDial=()=>{setRunning(false);setPhase('idle');clearTimeout(cdRef.current);syncSend('pause',{})};

  const connectG=()=>gConnect(()=>setGOk(true));
  const fetchTabs=async(id)=>{const sid=id||cfg.sheetId;const m=sid?.match(/\/d\/([a-zA-Z0-9_-]+)/)||sid?.match(/^([a-zA-Z0-9_-]{20,})$/);if(!m){toast('Bad URL','err');return}const fid=m[1];setCfg(s=>({...s,sheetId:fid}));setSLoad(true);try{setSTabs(await gSheets.meta(fid));toast('Tabs loaded')}catch(e){toast(e.message,'err')}setSLoad(false)};
  const searchSheets=async()=>{if(!gOk){toast('Connect Google first','err');return}setSheetSearching(true);try{const files=await gDrive.search(sheetQ);setSheetResults(files);if(!files.length)toast('No sheets found','err')}catch(e){toast(e.message,'err')}setSheetSearching(false)};
  const pickSheet=async(file)=>{setCfg(s=>({...s,sheetId:file.id,sheetTab:''}));setSheetResults([]);setSheetQ('');setSLoad(true);try{setSTabs(await gSheets.meta(file.id));toast(`"${file.name}" loaded`)}catch(e){toast(e.message,'err')}setSLoad(false)};
  const fetchLeads=async()=>{if(!cfg.sheetId||!cfg.sheetTab)return;setSLoad(true);try{const v=await gSheets.vals(cfg.sheetId,cfg.sheetTab);if(v.length<2){toast('Empty','err');setSLoad(false);return}
    const headers=v[0].map(String);const rows=v.slice(1);
    // Try AI analysis first (1 API call)
    toast('Analyzing with AI…','info');
    const aiResult=await aiParseSheet(rows,headers);
    if(aiResult&&aiResult.leads.length>0){setLeads(aiResult.leads);toast(`✨ ${aiResult.count} leads loaded (AI-powered)`);setSLoad(false);return}
    // Fallback to regex
    const r=parseSheet(rows,headers);if(r.error){toast(r.error,'err');setSLoad(false);return}setLeads(r.leads);toast(`${r.count} leads loaded`)}catch(e){toast(e.message,'err')}setSLoad(false)};
  const handleFile=async e=>{const f=e.target.files?.[0];if(!f)return;try{const ext=f.name.split('.').pop().toLowerCase();let h,r;if(['csv','tsv','txt'].includes(ext)){const p=Papa.parse(await f.text(),{header:false,skipEmptyLines:true});h=p.data[0].map(String);r=p.data.slice(1)}else{const wb=XLSX.read(await f.arrayBuffer(),{type:'array'});const d=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});h=d[0].map(String);r=d.slice(1)}
    const aiResult=await aiParseSheet(r,h);
    if(aiResult&&aiResult.leads.length>0){setLeads(p=>[...p,...aiResult.leads]);toast(`✨ ${aiResult.count} leads imported (AI)`);return}
    const res=parseSheet(r,h);if(res.error){toast(res.error,'err');return}setLeads(p=>[...p,...res.leads]);toast(`${res.count} leads imported`)}catch(err){toast(err.message,'err')}if(fileRef.current)fileRef.current.value=''};
  const exportCSV=()=>{const d=leads.map(l=>({Name:l.name,Phone:l.phone,Email:l.email,Status:l.status.toUpperCase(),NP:l.npCount,Called:l.calledAt||'',Notes:l.notes}));const csv=Papa.unparse(d);const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`autodial-${new Date().toISOString().slice(0,10)}.csv`;a.click()};
  const addLead=()=>{if(!newF.name||!newF.phone)return;setLeads(p=>[...p,{id:Date.now(),name:newF.name.trim(),phone:newF.phone.trim(),email:'',age:'',race:'',income:'',status:'pending',npCount:0,cbDate:'',cbTime:'',cbHistory:[],calledAt:null,notes:'',sheetRow:0,statusCol:-1}]);setNewF({name:'',phone:''});setShowAdd(false)};
  const fmtTime=s=>`${Math.floor(s/3600).toString().padStart(2,'0')}:${Math.floor((s%3600)/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  const histLeads=leads.filter(l=>{if(l.status==='pending')return false;if(histF!=='all'&&l.status!==histF)return false;if(search){const s=search.toLowerCase();return l.name.toLowerCase().includes(s)||l.phone.includes(s)}return true});
  const detailLead=leads.find(l=>l.id===detailId);

  // Admin tabs
  const adminTabs=[['dial','📞'],['stats','🏆'],['timesheet','💰'],['history','📊'],['leads','📋'],['settings','⚙️']];
  const mainTabs=[['leads','📋'],['timesheet','💰'],['tracking','📊'],['settings','⚙️']];
  const tabs=role==='admin'?adminTabs:mainTabs;
  const totalEarnings=sessionLog.reduce((s,x)=>s+(x.pay||0),0);

  return(
  <div style={{minHeight:'100vh',background:'var(--bg)',maxWidth:520,margin:'0 auto'}}>
    <Confetti show={confetti}/>
    <MilestonePopup show={!!milestone} {...(milestone||{})} onClose={()=>setMilestone(null)}/>

    {/* Header */}
    <div style={{padding:'12px 16px 6px',display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(135deg,var(--accent),#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      </div>
      <div style={{flex:1}}>
        <h1 style={{fontSize:16,fontWeight:700,color:'#f1f5f9',margin:0}}>AutoDial <span style={{fontSize:10,color:role==='admin'?'var(--amber)':'var(--accent2)',fontWeight:600}}>{role==='admin'?'ADMIN':'MAIN'}</span></h1>
        <p style={{margin:0,fontSize:10,color:'var(--text3)'}}>{userName} {session&&!session.ended&&<span style={{color:'var(--green)'}}>● LIVE {fmtTime(elapsed)}</span>}</p>
      </div>
      {role==='admin'&&<div style={{textAlign:'right'}}>
        <p style={{margin:0,fontSize:12,fontWeight:800,color:tier.color}}>{tier.label}</p>
        <p className="mono" style={{margin:0,fontSize:10,color:'var(--text3)'}}>${hourlyRate}/hr</p>
      </div>}
      <button onClick={()=>{if(confirm('Sign out?'))authLogout()}} style={{padding:'4px 8px',borderRadius:6,background:'var(--bg3)',color:'var(--text3)',fontSize:10,fontWeight:600,border:'1px solid var(--border)'}}>Out</button>
    </div>
    <div style={{margin:'0 16px 4px',height:3,borderRadius:2,background:'var(--border)',overflow:'hidden'}}><div style={{height:'100%',width:`${progress}%`,background:'linear-gradient(90deg,var(--accent),#a78bfa)',transition:'width .4s'}}/></div>

    {/* Install Banner */}
    <div id="install-banner" style={{display:'none',margin:'0 16px 8px',padding:'10px 14px',borderRadius:10,background:'linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1))',border:'1px solid rgba(99,102,241,.25)',alignItems:'center',gap:10}}>
      <div style={{flex:1}}>
        <p style={{margin:0,fontSize:12,fontWeight:600,color:'var(--accent2)'}}>📲 Install AutoDial</p>
        <p style={{margin:0,fontSize:10,color:'var(--text3)'}}>Add to home screen for full-screen experience</p>
      </div>
      <button onClick={()=>{if(window._installPrompt){window._installPrompt.prompt();window._installPrompt.userChoice.then(()=>{window._installPrompt=null;document.getElementById('install-banner').style.display='none'})}}} style={{padding:'7px 14px',borderRadius:8,background:'linear-gradient(135deg,var(--accent),#8b5cf6)',color:'#fff',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>Install</button>
      <button onClick={()=>{document.getElementById('install-banner').style.display='none'}} style={{background:'none',color:'var(--text3)',fontSize:16,padding:'0 4px'}}>×</button>
    </div>

    {/* Tabs */}
    <div style={{display:'flex',padding:'0 12px',gap:2,marginBottom:8}}>
      {tabs.map(([k,v])=><button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'8px 0',borderRadius:8,background:tab===k?'var(--adim)':'transparent',color:tab===k?'var(--accent2)':'var(--text3)',fontSize:11,fontWeight:600}}>{v} {k.charAt(0).toUpperCase()+k.slice(1)}</button>)}
    </div>

    {/* ═══ ADMIN: DIALER ═══ */}
    {tab==='dial'&&role==='admin'&&<div style={{padding:'0 16px'}}>
      {/* Session bar */}
      {session&&!session.ended&&<div className="card" style={{marginBottom:10,background:'linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.05))',borderColor:'rgba(99,102,241,.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span className="mono" style={{fontSize:20,fontWeight:700,color:'var(--accent2)'}}>{fmtTime(elapsed)}</span>
          <button onClick={endSession} style={{padding:'6px 14px',borderRadius:8,background:'var(--rdim)',color:'var(--red)',fontSize:11,fontWeight:700}}>End Session</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          {[['Dialed',session.dialed,'var(--text2)'],['Set',session.sets,'var(--green)'],['NP',session.np,'var(--amber)'],['CB',session.cb,'var(--blue)'],['NI',session.ni,'var(--red)']].map(([l,v,c])=>
            <div key={l} style={{flex:1,textAlign:'center',padding:'6px 0',borderRadius:6,background:'var(--bg)'}}>
              <p style={{margin:0,fontSize:16,fontWeight:800,color:c}}>{v}</p><p style={{margin:0,fontSize:8,color:'var(--text3)',fontWeight:600}}>{l}</p>
            </div>
          )}
        </div>
        {/* M/N progress */}
        <div style={{marginBottom:4}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:3}}>
            <span>Full session: {session.sets}/{myCfg.mThresh} appts</span>
            {session.sets>=myCfg.mThresh&&<span style={{color:'var(--green)',fontWeight:700}}>✓ EARNED</span>}
          </div>
          <div style={{height:6,borderRadius:3,background:'var(--bg)',overflow:'hidden'}}><div style={{height:'100%',borderRadius:3,width:`${Math.min(100,(session.sets/myCfg.mThresh)*100)}%`,background:session.sets>=myCfg.mThresh?'var(--green)':'var(--accent)',transition:'width .5s'}}/></div>
        </div>
        <div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:3}}>
            <span>1.5× Bonus: {session.sets}/{myCfg.nThresh} appts</span>
            {session.sets>=myCfg.nThresh&&<span style={{color:'var(--gold)',fontWeight:700,animation:'firePulse 2s infinite'}}>🔥 ACTIVE</span>}
          </div>
          <div style={{height:6,borderRadius:3,background:'var(--bg)',overflow:'hidden'}}><div style={{height:'100%',borderRadius:3,width:`${Math.min(100,(session.sets/myCfg.nThresh)*100)}%`,background:session.sets>=myCfg.nThresh?'var(--gold)':'var(--amber)',transition:'width .5s'}}/></div>
        </div>
      </div>}

      {/* Call card */}
      <div className="card" style={{textAlign:'center',marginBottom:10,minHeight:140,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:phase==='calling'?'var(--adim)':'var(--bg2)',borderColor:phase==='calling'?'rgba(99,102,241,.3)':'var(--border)'}}>
        {cur&&running?(
          <>
            {phase==='calling'?<div style={{width:60,height:60,borderRadius:'50%',border:'2px solid rgba(99,102,241,.4)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10,animation:'pulse 2s infinite'}}><div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700,color:'#fff'}}>{cur.name.charAt(0)}</div></div>
            :<div style={{width:60,height:60,borderRadius:'50%',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:10,fontSize:22,fontWeight:700,color:'var(--accent2)'}}>{countdown}</div>}
            <p style={{margin:0,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--accent)',marginBottom:2}}>{phase==='calling'?'Calling':'Next in'}</p>
            <h2 style={{margin:'0 0 2px',fontSize:18,fontWeight:700,color:'#f1f5f9'}}>{cur.name}</h2>
            <p className="mono" style={{margin:0,fontSize:13,color:'var(--text3)'}}>{cur.phone}</p>
            {cur.age&&<span className="pill" style={{background:'var(--bg3)',color:'var(--text3)',marginTop:4}}>Age {cur.age} {cur.race?`· ${cur.race}`:''} {cur.income?`· $${cur.income}`:''}</span>}
            {cur.npCount>0&&<p style={{margin:'3px 0 0',fontSize:10,color:'var(--amber)'}}>NP ×{cur.npCount}</p>}
            {phase==='calling'&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginTop:12,width:'100%'}}>
              <button onClick={()=>handleOutcome('np')} style={{padding:'11px 0',borderRadius:10,background:'var(--amdim)',color:'var(--amber)',fontSize:13,fontWeight:700}}>NP</button>
              <button onClick={()=>{setShowCb(true);setCbDate('');setCbTime('')}} style={{padding:'11px 0',borderRadius:10,background:'var(--bdim)',color:'var(--blue)',fontSize:13,fontWeight:700}}>CB</button>
              <button onClick={()=>handleOutcome('ni')} style={{padding:'11px 0',borderRadius:10,background:'var(--rdim)',color:'var(--red)',fontSize:13,fontWeight:700}}>NI</button>
              <button onClick={()=>handleOutcome('set')} style={{padding:'11px 0',borderRadius:10,background:'var(--gdim)',color:'var(--green)',fontSize:13,fontWeight:700}}>Set ✓</button>
              <button onClick={()=>handleOutcome('pending')} style={{gridColumn:'1/-1',padding:'8px 0',borderRadius:8,background:'var(--bg3)',color:'var(--text3)',fontSize:11,fontWeight:600}}>Skip →</button>
            </div>}
          </>
        ):(
          <p style={{color:'var(--text3)',fontSize:13}}>{pending.length>0?'Ready':'No leads'}</p>
        )}
      </div>

      <div className="card" style={{marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:12,color:'var(--text3)'}}>Delay</span>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={()=>setCfg(s=>({...s,delay:Math.max(3,s.delay-5)}))} style={{width:28,height:28,borderRadius:7,background:'var(--bg3)',color:'var(--text3)',fontSize:14}}>−</button>
          <span className="mono" style={{fontSize:14,fontWeight:700,color:'var(--accent2)',minWidth:32,textAlign:'center'}}>{cfg.delay}s</span>
          <button onClick={()=>setCfg(s=>({...s,delay:Math.min(60,s.delay+5)}))} style={{width:28,height:28,borderRadius:7,background:'var(--bg3)',color:'var(--text3)',fontSize:14}}>+</button>
        </div>
      </div>

      {/* ─── Session Filters ─── */}
      <button onClick={()=>setShowFilters(!showFilters)} style={{width:'100%',padding:'8px',borderRadius:8,background:showFilters?'var(--adim)':'var(--bg3)',color:showFilters?'var(--accent2)':'var(--text3)',fontSize:11,fontWeight:600,marginBottom:showFilters?0:10,border:'1px solid '+(showFilters?'rgba(99,102,241,.2)':'var(--border)'),display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
        🎯 Filters {(filters.genderFilter!=='all'||filters.ageFilter||filters.skipAllNP)&&<span className="pill" style={{background:'var(--adim)',color:'var(--accent2)'}}>Active</span>}
      </button>
      {showFilters&&<div className="card" style={{marginBottom:10,marginTop:6}}>
        {/* Gender filter */}
        <div style={{marginBottom:10,opacity:hasGender?1:.4,pointerEvents:hasGender?'auto':'none'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text2)'}}>Gender</span>
            {!hasGender&&<span className="pill" style={{background:'var(--bg3)',color:'var(--text3)'}}>No data detected</span>}
          </div>
          <div style={{display:'flex',gap:6}}>
            {[['all','All'],['male','♂ Male'],['female','♀ Female']].map(([k,v])=>
              <button key={k} onClick={()=>setFilters(f=>({...f,genderFilter:k}))} style={{flex:1,padding:'8px 0',borderRadius:8,fontSize:11,fontWeight:600,background:filters.genderFilter===k?'var(--adim)':'var(--bg3)',color:filters.genderFilter===k?'var(--accent2)':'var(--text3)',border:`1px solid ${filters.genderFilter===k?'rgba(99,102,241,.3)':'var(--border)'}`}}>{v}</button>
            )}
          </div>
        </div>
        {/* Age range filter */}
        <div style={{marginBottom:10,opacity:hasAge?1:.4,pointerEvents:hasAge?'auto':'none'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <input type="checkbox" checked={filters.ageFilter} onChange={e=>setFilters(f=>({...f,ageFilter:e.target.checked}))} style={{width:16,height:16,accentColor:'var(--accent)'}}/>
            <span style={{fontSize:11,fontWeight:600,color:'var(--text2)'}}>Age Range</span>
            {!hasAge&&<span className="pill" style={{background:'var(--bg3)',color:'var(--text3)'}}>No data</span>}
          </div>
          {filters.ageFilter&&<div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input type="number" value={filters.ageMin} onChange={e=>setFilters(f=>({...f,ageMin:e.target.value}))} placeholder="Min" style={{flex:1,textAlign:'center',fontSize:13,padding:'8px'}}/>
            <span style={{color:'var(--text3)',fontSize:12}}>to</span>
            <input type="number" value={filters.ageMax} onChange={e=>setFilters(f=>({...f,ageMax:e.target.value}))} placeholder="Max" style={{flex:1,textAlign:'center',fontSize:13,padding:'8px'}}/>
          </div>}
        </div>
        {/* Skip all NPs */}
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <input type="checkbox" checked={filters.skipAllNP} onChange={e=>setFilters(f=>({...f,skipAllNP:e.target.checked}))} style={{width:16,height:16,accentColor:'var(--amber)'}}/>
          <span style={{fontSize:11,fontWeight:600,color:'var(--text2)'}}>Skip all NPs</span>
          <span style={{fontSize:10,color:'var(--text3)'}}>(NP×1 through NP×4)</span>
        </div>
      </div>}

      <button onClick={running?pauseDial:startDial} disabled={pending.length===0} style={{width:'100%',padding:'14px',borderRadius:12,background:running?'linear-gradient(135deg,#dc2626,#ef4444)':'linear-gradient(135deg,var(--accent),#8b5cf6)',color:'#fff',fontSize:15,fontWeight:700,opacity:pending.length===0?.4:1,marginBottom:8}}>
        {running?'⏸ Pause':'▶ Start ('+pending.length+')'}
      </button>

      {/* Session summary (ended) */}
      {session?.ended&&<div className="card" style={{marginBottom:10,borderColor:session.bonus?'var(--gold)':'var(--green)',animation:session.bonus?'glow 2s infinite':'none'}}>
        <h3 style={{fontSize:15,fontWeight:700,color:'#f1f5f9',marginBottom:8}}>Session Complete</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>
          <div style={{padding:8,borderRadius:8,background:'var(--bg3)'}}><p style={{margin:0,fontSize:9,color:'var(--text3)'}}>Duration</p><p className="mono" style={{margin:0,fontSize:14,color:'var(--text)'}}>{fmtTime(session.elapsed)}</p></div>
          <div style={{padding:8,borderRadius:8,background:'var(--bg3)'}}><p style={{margin:0,fontSize:9,color:'var(--text3)'}}>Dialed</p><p style={{margin:0,fontSize:14,fontWeight:700,color:'var(--text)'}}>{session.dialed}</p></div>
          <div style={{padding:8,borderRadius:8,background:'var(--gdim)'}}><p style={{margin:0,fontSize:9,color:'var(--text3)'}}>Appts Set</p><p style={{margin:0,fontSize:14,fontWeight:700,color:'var(--green)'}}>{session.sets}</p></div>
          <div style={{padding:8,borderRadius:8,background:session.bonus?'var(--golddim)':'var(--bg3)'}}><p style={{margin:0,fontSize:9,color:'var(--text3)'}}>Earnings</p><p style={{margin:0,fontSize:14,fontWeight:800,color:session.bonus?'var(--gold)':'var(--text)'}}>${session.pay?.toFixed(2)} {session.bonus?'🔥1.5×':''}</p></div>
        </div>
        <div style={{display:'flex',gap:6,fontSize:11,color:'var(--text3)'}}>
          <span>NP:{session.np}</span><span>CB:{session.cb}</span><span>NI:{session.ni}</span>
          <span style={{color:session.fullSession?'var(--green)':'var(--text3)'}}>Full: {session.fullSession?'✓':'✗'}</span>
        </div>
        <button onClick={()=>setSession(null)} style={{width:'100%',marginTop:10,padding:'10px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>New Session</button>
      </div>}
      <div style={{height:80}}/>
    </div>}

    {/* ═══ ADMIN: STATS ═══ */}
    {tab==='stats'&&role==='admin'&&<div style={{padding:'0 16px',paddingBottom:100}}>
      <div className="card" style={{marginBottom:12,textAlign:'center',borderColor:tier.color+'40',background:`linear-gradient(135deg,${tier.color}08,transparent)`}}>
        <p style={{fontSize:48,margin:'0 0 4px'}}>{tier.idx===2?'🥇':tier.idx===1?'🥈':'🥉'}</p>
        <h2 style={{fontSize:22,fontWeight:800,color:tier.color,margin:'0 0 2px'}}>{tier.label}</h2>
        <p className="mono" style={{fontSize:16,color:'var(--text)',margin:'0 0 8px'}}>${hourlyRate}/hr</p>
        <p style={{fontSize:28,fontWeight:800,color:'#f1f5f9',margin:'0 0 4px'}}>{totalSets}</p>
        <p style={{fontSize:12,color:'var(--text3)'}}>Total Appointments Set</p>
        {nextTier&&<div style={{marginTop:12}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text3)',marginBottom:3}}>
            <span>Next: {nextTier.label}</span><span>{totalSets}/{nextTier.min}</span>
          </div>
          <div style={{height:8,borderRadius:4,background:'var(--bg)',overflow:'hidden'}}><div style={{height:'100%',borderRadius:4,width:`${(totalSets/nextTier.min)*100}%`,background:`linear-gradient(90deg,${tier.color},${nextTier.color})`,transition:'width .5s'}}/></div>
        </div>}
      </div>
      <h3 style={{fontSize:14,fontWeight:700,color:'#f1f5f9',marginBottom:8}}>Session History</h3>
      {sessionLog.map((s,i)=>{
        const d=new Date(s.startTime);
        return<div key={i} className="card" style={{marginBottom:6,padding:'10px 12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:600,color:'#f1f5f9'}}>{d.toLocaleDateString()} {d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
            <span className="mono" style={{fontSize:11,color:'var(--text3)'}}>{fmtTime(s.elapsed)}</span>
          </div>
          <div style={{display:'flex',gap:8,fontSize:11,color:'var(--text3)'}}>
            <span>Dialed:{s.dialed}</span><span style={{color:'var(--green)'}}>Set:{s.sets}</span><span>NP:{s.np}</span><span>CB:{s.cb}</span><span>NI:{s.ni}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:11}}>
            <span style={{color:s.tier?.includes('Gold')?'var(--gold)':s.tier?.includes('Silver')?'#c0c0c0':'#cd7f32',fontWeight:600}}>{s.tier}</span>
            <span style={{fontWeight:700,color:s.bonus?'var(--gold)':'var(--text)'}}>${s.pay?.toFixed(2)} {s.bonus?'🔥1.5×':''}{s.fullSession&&!s.bonus?' ✓Full':''}</span>
          </div>
        </div>
      })}
      {sessionLog.length===0&&<p style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:20}}>Complete sessions to see history</p>}
    </div>}

    {/* ═══ TIMESHEET (both roles) ═══ */}
    {tab==='timesheet'&&(()=>{
      const unpaidSessions=sessionLog.filter(s=>!s.paid);
      const paidSessions=sessionLog.filter(s=>s.paid);
      const unpaidSessionPay=unpaidSessions.reduce((a,s)=>a+(s.pay||0),0);
      const unpaidIncentives=incentives.filter(x=>!x.paid);
      const paidIncentives=incentives.filter(x=>x.paid);
      const unpaidIncentiveTotal=unpaidIncentives.reduce((a,x)=>a+(x.amount||0),0);
      const totalOwed=unpaidSessionPay+unpaidIncentiveTotal;
      const totalPaidAll=paidSessions.reduce((a,s)=>a+(s.pay||0),0)+paidIncentives.reduce((a,x)=>a+(x.amount||0),0);
      const totalAllTime=totalOwed+totalPaidAll;
      // Follow-up leads (status=set, can be updated to postpone/met/mia/closed)
      const setLeads=leads.filter(l=>l.status==='set'||l.followUp);

      return<div style={{padding:'0 16px',paddingBottom:100}}>
      {/* Earnings summary */}
      <div className="card" style={{marginBottom:10,textAlign:'center',background:'linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.04))',borderColor:'rgba(251,191,36,.2)'}}>
        <p style={{margin:0,fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.1em'}}>Outstanding Pay</p>
        <p className="mono" style={{margin:'4px 0 0',fontSize:32,fontWeight:800,color:totalOwed>0?'var(--gold)':'var(--green)'}}>${totalOwed.toFixed(2)}</p>
        <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:6,fontSize:11,color:'var(--text3)'}}>
          <span>Sessions: <b className="mono">${unpaidSessionPay.toFixed(2)}</b></span>
          <span>Incentives: <b className="mono">${unpaidIncentiveTotal.toFixed(2)}</b></span>
        </div>
        <div style={{marginTop:6,fontSize:10,color:'var(--text3)'}}>
          All-time earned: <b className="mono">${totalAllTime.toFixed(2)}</b> · Paid: <b className="mono">${totalPaidAll.toFixed(2)}</b>
        </div>
        <div style={{marginTop:4,fontSize:10,color:'var(--text3)'}}>Billing cycle: every <b>{cfg.billingDays}</b> days · {tier.label} · ${hourlyRate}/hr</div>
      </div>

      {/* Main: Mark paid + generate invoice */}
      {role==='main'&&unpaidSessions.length+unpaidIncentives.length>0&&<div style={{display:'flex',gap:6,marginBottom:10}}>
        <button onClick={()=>{setSessionLog(p=>p.map(s=>s.paid?s:{...s,paid:true,paidDate:new Date().toISOString()}));setIncentives(p=>p.map(x=>x.paid?x:{...x,paid:true,paidDate:new Date().toISOString()}));toast('All marked as paid ✓')}} style={{flex:1,padding:'10px',borderRadius:8,background:'var(--gdim)',color:'var(--green)',fontSize:12,fontWeight:600,border:'1px solid rgba(52,211,153,.2)'}}>✓ Mark All Paid</button>
        <button onClick={()=>setShowInvoice({sessions:unpaidSessions,incentives:unpaidIncentives,sessionPay:unpaidSessionPay,incentiveTotal:unpaidIncentiveTotal,total:totalOwed})} style={{flex:1,padding:'10px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>📄 Invoice</button>
      </div>}

      {/* Follow-up leads (Postpone/Met/MIA/Closed) */}
      {setLeads.length>0&&<>
        <h3 style={{fontSize:13,fontWeight:700,color:'#f1f5f9',marginBottom:6}}>📋 Appointment Follow-up</h3>
        {setLeads.map(l=><div key={l.id} className="card" style={{marginBottom:6,padding:'10px 12px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
            <div style={{flex:1}}><span style={{fontSize:13,fontWeight:600,color:'#f1f5f9'}}>{l.name}</span> <span className="mono" style={{fontSize:10,color:'var(--text3)'}}>{l.phone}</span></div>
            <Badge s={l.status} np={l.npCount} cbh={l.cbHistory} fu={l.followUp}/>
          </div>
          {!l.followUp&&<div style={{display:'flex',gap:5}}>
            {[['postpone','Postpone','var(--amber)','var(--amdim)'],['met','Met ✓','var(--green)','var(--gdim)'],['mia','MIA','var(--red)','var(--rdim)'],['closed','Closed','var(--gold)','var(--golddim)']].map(([k,label,c,bg])=>
              <button key={k} onClick={()=>{
                setLeads(p=>p.map(x=>x.id===l.id?{...x,followUp:k}:x));
                if(k==='met'){setIncentives(p=>[...p,{id:Date.now(),leadName:l.name,type:'met',amount:cfg.metIncentive,date:new Date().toISOString(),paid:false}]);toast(`+$${cfg.metIncentive} incentive for meeting ${l.name}`)}
                if(k==='closed'){setShowFollowUp(l.id)}
              }} style={{flex:1,padding:'7px 2px',borderRadius:6,background:bg,color:c,fontSize:10,fontWeight:700}}>{label}</button>
            )}
          </div>}
          {l.followUp==='closed'&&l.tip!=null&&<p style={{margin:'4px 0 0',fontSize:11,color:'var(--gold)'}}>💰 Tip: ${l.tip}</p>}
        </div>)}
      </>}

      {/* Session log */}
      <h3 style={{fontSize:13,fontWeight:700,color:'#f1f5f9',marginTop:12,marginBottom:6}}>📊 Sessions {unpaidSessions.length>0&&<span style={{color:'var(--amber)',fontWeight:600}}>({unpaidSessions.length} unpaid)</span>}</h3>
      {sessionLog.map((s,i)=>{
        const d=new Date(s.startTime);const ed=s.endTime?new Date(s.endTime):null;
        const hc=s.fullSession?myCfg.sessionDur:(s.elapsed/3600);
        return<div key={i} className="card" style={{marginBottom:6,padding:'10px 12px',opacity:s.paid?.6:1,borderColor:s.paid?'var(--border)':s.bonus?'rgba(251,191,36,.2)':'var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <div>
              <p style={{margin:0,fontSize:12,fontWeight:600,color:'#f1f5f9'}}>{d.toLocaleDateString('en-SG',{day:'numeric',month:'short'})}</p>
              <p className="mono" style={{margin:0,fontSize:10,color:'var(--text3)'}}>{d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}→{ed?ed.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—'}</p>
            </div>
            <div style={{textAlign:'right'}}>
              <p className="mono" style={{margin:0,fontSize:16,fontWeight:800,color:s.paid?'var(--text3)':s.bonus?'var(--gold)':'var(--text)'}}>{s.paid?'PAID':'$'+(s.pay||0).toFixed(2)}</p>
              {s.bonus&&!s.paid&&<span className="pill" style={{background:'var(--golddim)',color:'var(--gold)'}}>🔥1.5×</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',fontSize:10}}>
            <span style={{color:'var(--text2)'}}>D:{s.dialed}</span><span style={{color:'var(--green)'}}>S:{s.sets}</span><span style={{color:'var(--amber)'}}>NP:{s.np}</span><span style={{color:'var(--blue)'}}>CB:{s.cb}</span><span style={{color:'var(--red)'}}>NI:{s.ni}</span>
            <span style={{color:'var(--text3)'}}>· {s.tier} ${s.hourlyRate}/hr×{hc.toFixed(1)}h</span>
          </div>
          {role==='main'&&!s.paid&&<button onClick={()=>setSessionLog(p=>p.map((x,j)=>j===i?{...x,paid:true,paidDate:new Date().toISOString()}:x))} style={{marginTop:6,padding:'5px 10px',borderRadius:6,background:'var(--gdim)',color:'var(--green)',fontSize:10,fontWeight:600}}>✓ Mark Paid</button>}
        </div>
      })}

      {/* Incentives log */}
      {incentives.length>0&&<>
        <h3 style={{fontSize:13,fontWeight:700,color:'#f1f5f9',marginTop:12,marginBottom:6}}>🎯 Incentives & Tips</h3>
        {incentives.map((x,i)=><div key={x.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--border)',opacity:x.paid?.5:1}}>
          <span className="pill" style={{background:x.type==='met'?'var(--gdim)':x.type==='closed'?'var(--golddim)':'var(--bg3)',color:x.type==='met'?'var(--green)':'var(--gold)'}}>{x.type==='met'?'Met':'Tip'}</span>
          <span style={{flex:1,fontSize:12,color:'#cbd5e1'}}>{x.leadName}</span>
          <span className="mono" style={{fontSize:13,fontWeight:700,color:x.paid?'var(--text3)':'var(--gold)'}}>{x.paid?'PAID':'$'+x.amount.toFixed(2)}</span>
          {role==='main'&&!x.paid&&<button onClick={()=>setIncentives(p=>p.map((y,j)=>j===i?{...y,paid:true}:y))} style={{padding:'3px 8px',borderRadius:5,background:'var(--gdim)',color:'var(--green)',fontSize:9,fontWeight:600}}>✓</button>}
        </div>)}
      </>}

      {sessionLog.length===0&&incentives.length===0&&<div className="card" style={{textAlign:'center',padding:24}}><p style={{fontSize:24,marginBottom:8}}>📋</p><p style={{color:'var(--text3)',fontSize:13}}>Complete a session to see your timesheet</p></div>}
    </div>})()}

    {/* ═══ Follow-up Tip Modal (Main keys tip for Closed) ═══ */}
    {showFollowUp&&(()=>{const l=leads.find(x=>x.id===showFollowUp);if(!l)return null;
      return<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowFollowUp(null)}>
        <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,background:'var(--bg2)',borderRadius:'18px 18px 0 0',padding:'20px 20px 28px',border:'1px solid var(--border2)'}}>
          <h3 style={{margin:'0 0 8px',fontSize:17,fontWeight:700,color:'var(--gold)'}}>🎉 Deal Closed — {l.name}</h3>
          <p style={{margin:'0 0 14px',fontSize:13,color:'var(--text3)'}}>Enter discretionary tip (or $0 to skip)</p>
          <input type="number" value={tipAmount} onChange={e=>setTipAmount(e.target.value)} placeholder="Tip amount ($)" style={{marginBottom:14,colorScheme:'dark'}}/>
          <button onClick={()=>{
            const tip=parseFloat(tipAmount)||0;
            setLeads(p=>p.map(x=>x.id===l.id?{...x,followUp:'closed',tip}:x));
            if(tip>0)setIncentives(p=>[...p,{id:Date.now(),leadName:l.name,type:'closed',amount:tip,date:new Date().toISOString(),paid:false}]);
            toast(tip>0?`$${tip} tip added for ${l.name}`:`${l.name} closed`);
            setShowFollowUp(null);setTipAmount('');
          }} style={{width:'100%',padding:'13px',borderRadius:10,background:'linear-gradient(135deg,var(--gold),#f59e0b)',color:'#0b0f1a',fontSize:14,fontWeight:700}}>Confirm</button>
        </div>
      </div>})()}

    {/* ═══ Invoice Modal ═══ */}
    {showInvoice&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={()=>setShowInvoice(null)}>
      <div id="invoice-content" onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,maxHeight:'85vh',overflow:'auto',background:'#fff',borderRadius:16,padding:'28px 24px',color:'#111'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <div><h2 style={{margin:0,fontSize:20,fontWeight:800,color:'#111'}}>INVOICE</h2><p style={{margin:'2px 0 0',fontSize:11,color:'#666'}}>Freelance Admin Services</p></div>
          <div style={{textAlign:'right'}}><p style={{margin:0,fontSize:11,color:'#666'}}>Date: {new Date().toLocaleDateString('en-SG')}</p><p style={{margin:0,fontSize:11,color:'#666'}}>Invoice #{Date.now().toString(36).toUpperCase()}</p></div>
        </div>
        <div style={{borderTop:'2px solid #111',borderBottom:'1px solid #ddd',padding:'12px 0',marginBottom:16}}>
          <p style={{margin:0,fontSize:12,color:'#666'}}>From: <b style={{color:'#111'}}>{userName}</b></p>
          <p style={{margin:'4px 0 0',fontSize:12,color:'#666'}}>To: <b style={{color:'#111'}}>Main / Manager</b></p>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,marginBottom:16}}>
          <thead><tr style={{borderBottom:'1px solid #ddd'}}><th style={{textAlign:'left',padding:'6px 4px',color:'#666',fontWeight:600}}>Description</th><th style={{textAlign:'right',padding:'6px 4px',color:'#666',fontWeight:600}}>Amount</th></tr></thead>
          <tbody>
            {showInvoice.sessions.map((s,i)=>{const d=new Date(s.startTime);return<tr key={i} style={{borderBottom:'1px solid #eee'}}><td style={{padding:'6px 4px'}}>Session {d.toLocaleDateString('en-SG',{day:'numeric',month:'short'})} · {s.tier} · {s.sets} appts {s.bonus?'(1.5× bonus)':s.fullSession?'(full session)':''}</td><td style={{padding:'6px 4px',textAlign:'right',fontWeight:600}}>${(s.pay||0).toFixed(2)}</td></tr>})}
            {showInvoice.incentives.map((x,i)=><tr key={'i'+i} style={{borderBottom:'1px solid #eee'}}><td style={{padding:'6px 4px'}}>{x.type==='met'?'Meeting incentive':'Tip'}: {x.leadName}</td><td style={{padding:'6px 4px',textAlign:'right',fontWeight:600}}>${x.amount.toFixed(2)}</td></tr>)}
          </tbody>
        </table>
        <div style={{display:'flex',justifyContent:'space-between',padding:'10px 4px',borderTop:'2px solid #111',fontSize:16,fontWeight:800}}>
          <span>TOTAL</span><span>${showInvoice.total.toFixed(2)}</span>
        </div>
        <div style={{display:'flex',gap:8,marginTop:20}}>
          <button onClick={()=>{window.print()}} style={{flex:1,padding:'12px',borderRadius:10,background:'#111',color:'#fff',fontSize:13,fontWeight:700}}>🖨 Print</button>
          <button onClick={()=>setShowInvoice(null)} style={{padding:'12px 20px',borderRadius:10,background:'#eee',color:'#666',fontSize:13,fontWeight:600}}>Close</button>
        </div>
      </div>
    </div>}

    {/* ═══ HISTORY (both roles) ═══ */}
    {tab==='history'&&<div style={{padding:'0 16px',paddingBottom:100}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" style={{marginBottom:8}}/>
      <div style={{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap'}}>
        {[['all','All','var(--accent2)'],['np','NP','var(--amber)'],['cb','CB','var(--blue)'],['ni','NI','var(--red)'],['set','Set','var(--green)']].map(([k,v,c])=>(
          <button key={k} onClick={()=>setHistF(k)} style={{padding:'5px 12px',borderRadius:16,fontSize:10,fontWeight:700,background:histF===k?'var(--bg3)':'transparent',color:histF===k?c:'var(--text3)'}}>{v}({k==='all'?leads.filter(l=>l.status!=='pending').length:leads.filter(l=>l.status===k).length})</button>
        ))}
      </div>
      <button onClick={exportCSV} style={{width:'100%',padding:'10px',borderRadius:8,background:'var(--gdim)',color:'var(--green)',fontSize:12,fontWeight:600,marginBottom:10}}>⬇ Export CSV</button>
      {histLeads.map(l=><div key={l.id} className="card" style={{marginBottom:5,padding:'8px 10px',cursor:'pointer'}} onClick={()=>setDetailId(l.id)}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:28,height:28,borderRadius:7,background:ST[l.status]?.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:ST[l.status]?.c}}>{l.name.charAt(0)}</div>
          <div style={{flex:1,minWidth:0}}><p style={{margin:0,fontSize:12,fontWeight:600,color:'#cbd5e1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</p><div style={{display:'flex',gap:4,marginTop:1}}><span className="mono" style={{fontSize:10,color:'var(--text3)'}}>{l.phone}</span><Badge s={l.status} np={l.npCount} cbh={l.cbHistory}/></div></div>
        </div>
      </div>)}
    </div>}

    {/* ═══ LEADS (both) ═══ */}
    {tab==='leads'&&<div style={{padding:'0 16px',paddingBottom:100}}>
      <div className="card" style={{marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <p style={{margin:0,fontSize:13,fontWeight:600,color:'var(--accent2)'}}>📊 Google Sheets</p>
          {!gOk?<button onClick={connectG} style={{padding:'5px 12px',borderRadius:7,background:'var(--adim)',color:'var(--accent2)',fontSize:11,fontWeight:600}}>Connect</button>
          :<span className="pill" style={{background:'var(--gdim)',color:'var(--green)'}}>Connected</span>}
        </div>
        {gOk&&<>
          {/* Search sheets */}
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <input value={sheetQ} onChange={e=>setSheetQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')searchSheets()}} placeholder="🔍 Search your Google Sheets…" style={{flex:1,fontSize:13}}/>
            <button onClick={searchSheets} disabled={sheetSearching} style={{padding:'0 14px',borderRadius:10,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600,flexShrink:0,whiteSpace:'nowrap'}}>{sheetSearching?'…':'Search'}</button>
          </div>
          {/* Search results */}
          {sheetResults.length>0&&<div style={{marginBottom:8,maxHeight:200,overflowY:'auto',borderRadius:8,border:'1px solid var(--border)'}}>
            {sheetResults.map(f=><div key={f.id} onClick={()=>pickSheet(f)} style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',cursor:'pointer',display:'flex',alignItems:'center',gap:8,background:'var(--bg3)'}}>
              <span style={{fontSize:16}}>📊</span>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:12,fontWeight:600,color:'#f1f5f9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</p>
                <p style={{margin:0,fontSize:10,color:'var(--text3)'}}>{f.modifiedTime?new Date(f.modifiedTime).toLocaleDateString():''}</p>
              </div>
            </div>)}
          </div>}
          {/* Or paste URL */}
          <div style={{display:'flex',gap:6,marginBottom:8,alignItems:'center'}}>
            <div style={{height:1,flex:1,background:'var(--border)'}}/>
            <span style={{fontSize:10,color:'var(--text3)',flexShrink:0}}>or paste URL</span>
            <div style={{height:1,flex:1,background:'var(--border)'}}/>
          </div>
          <input value={cfg.sheetId||''} onChange={e=>setCfg(s=>({...s,sheetId:e.target.value}))} placeholder="Paste Google Sheet URL" style={{marginBottom:8,fontSize:13}}/>
          <button onClick={()=>fetchTabs()} disabled={sLoad} style={{width:'100%',padding:'9px',borderRadius:8,background:'var(--bg3)',color:'var(--text2)',fontSize:12,fontWeight:600,border:'1px solid var(--border)',marginBottom:8}}>Load Tabs</button>
          {sTabs.length>0&&<>
            <select value={cfg.sheetTab||''} onChange={e=>setCfg(s=>({...s,sheetTab:e.target.value}))} style={{marginBottom:8}}>
              <option value="">Select tab…</option>{sTabs.map(t=><option key={t.id} value={t.title}>{t.title} ({t.rows} rows)</option>)}
            </select>
            <button onClick={fetchLeads} disabled={!cfg.sheetTab} style={{width:'100%',padding:'10px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>Fetch Leads</button>
          </>}
        </>}
      </div>
      <input ref={fileRef} type="file" accept=".csv,.tsv,.xlsx,.xls" onChange={handleFile} style={{display:'none'}}/>
      <button onClick={()=>fileRef.current?.click()} style={{width:'100%',padding:'14px',borderRadius:10,border:'2px dashed var(--border2)',background:'transparent',color:'var(--text2)',fontSize:12,fontWeight:600,marginBottom:8}}>📁 Upload CSV/Excel</button>
      <button onClick={()=>setShowAdd(!showAdd)} style={{width:'100%',padding:'9px',borderRadius:8,border:'1px dashed var(--border2)',background:'transparent',color:'var(--text3)',fontSize:12,fontWeight:600,marginBottom:8}}>+ Add</button>
      {showAdd&&<div className="card" style={{marginBottom:10,display:'flex',flexDirection:'column',gap:8}}><input value={newF.name} onChange={e=>setNewF(f=>({...f,name:e.target.value}))} placeholder="Name"/><input value={newF.phone} onChange={e=>setNewF(f=>({...f,phone:e.target.value}))} placeholder="Phone" type="tel"/><button onClick={addLead} style={{padding:'10px',borderRadius:8,background:'linear-gradient(135deg,var(--accent),#8b5cf6)',color:'#fff',fontSize:13,fontWeight:600}}>Add</button></div>}
      {leads.length>0&&<div style={{display:'flex',gap:6,marginBottom:8}}><button onClick={()=>{setLeads([])}} style={{flex:1,padding:'8px',borderRadius:7,background:'var(--rdim)',color:'var(--red)',fontSize:11,fontWeight:600}}>Clear</button><button onClick={()=>{setLeads(p=>p.map(l=>({...l,status:'pending',npCount:0,calledAt:null,notes:'',cbHistory:[]})))}} style={{flex:1,padding:'8px',borderRadius:7,background:'var(--bg3)',color:'var(--text3)',fontSize:11,fontWeight:600}}>Reset</button></div>}
      {leads.slice(0,50).map(l=><div key={l.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{width:30,height:30,borderRadius:7,background:ST[l.status]?.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:ST[l.status]?.c,flexShrink:0}}>{l.name.charAt(0)}</div>
        <div style={{flex:1,minWidth:0}}><p style={{margin:0,fontSize:12,fontWeight:600,color:'#cbd5e1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</p><span className="mono" style={{fontSize:10,color:'var(--text3)'}}>{l.phone}</span> <Badge s={l.status} np={l.npCount} cbh={l.cbHistory}/></div>
      </div>)}
      {leads.length>50&&<p style={{fontSize:11,color:'var(--text3)',textAlign:'center',padding:8}}>Showing 50 of {leads.length}</p>}
    </div>}

    {/* ═══ TRACKING (Main only) ═══ */}
    {tab==='tracking'&&role==='main'&&<div style={{padding:'0 16px',paddingBottom:100}}>
      <h3 style={{fontSize:15,fontWeight:700,color:'#f1f5f9',marginBottom:10}}>Admin Sessions</h3>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5,marginBottom:14}}>
        {[['NP','var(--amber)','var(--amdim)','np'],['CB','var(--blue)','var(--bdim)','cb'],['NI','var(--red)','var(--rdim)','ni'],['Set','var(--green)','var(--gdim)','set']].map(([l,c,bg,k])=>(
          <div key={k} style={{textAlign:'center',padding:'8px 0',borderRadius:8,background:bg}}><p style={{margin:0,fontSize:16,fontWeight:700,color:c}}>{leads.filter(x=>x.status===k).length}</p><p style={{margin:0,fontSize:9,color:'var(--text3)',fontWeight:600}}>{l}</p></div>
        ))}
      </div>
      <button onClick={exportCSV} style={{width:'100%',padding:'10px',borderRadius:8,background:'var(--gdim)',color:'var(--green)',fontSize:12,fontWeight:600,marginBottom:10}}>⬇ Export Full Report</button>
      {leads.filter(l=>l.calledAt).slice(0,30).map(l=><div key={l.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
        <Badge s={l.status} np={l.npCount} cbh={l.cbHistory}/>
        <div style={{flex:1,minWidth:0}}><span style={{fontSize:12,color:'#cbd5e1'}}>{l.name}</span> <span className="mono" style={{fontSize:10,color:'var(--text3)'}}>{l.phone}</span></div>
        <span style={{fontSize:10,color:'var(--text3)'}}>{l.calledAt}</span>
      </div>)}
    </div>}

    {/* ═══ SETTINGS ═══ */}
    {tab==='settings'&&<div style={{padding:'0 16px',paddingBottom:100}}>

      {/* ═══ Creator: User Management ═══ */}
      {isCreatorUser&&<div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h3 style={{fontSize:14,fontWeight:600,color:'var(--accent2)'}}>👥 User Management</h3>
          <button onClick={async()=>{
            setUsersLoading(true);
            try{const r=await _SB.from('profiles').select('*').order('created_at',{ascending:false});setUsersList(r.data||[])}catch(e){toast(e.message,'err')}
            setUsersLoading(false);
          }} style={{padding:'5px 12px',borderRadius:7,background:'var(--adim)',color:'var(--accent2)',fontSize:10,fontWeight:600}}>{usersLoading?'Loading…':'Load Users'}</button>
        </div>
        <p style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>Approve or revoke access. Only you (Creator) can manage users.</p>

        {usersList.map(u=>(
          <div key={u.id} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <div style={{width:32,height:32,borderRadius:8,background:u.approved?'var(--gdim)':'var(--rdim)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:u.approved?'var(--green)':'var(--red)',flexShrink:0}}>{(u.full_name||u.email||'?').charAt(0).toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <p style={{margin:0,fontSize:12,fontWeight:600,color:'#f1f5f9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.full_name||'—'}</p>
              <div style={{display:'flex',alignItems:'center',gap:4,marginTop:1}}>
                <span style={{fontSize:10,color:'var(--text3)'}}>{u.email}</span>
                <span className="pill" style={{background:u.autodial_role==='main'?'var(--adim)':'var(--amdim)',color:u.autodial_role==='main'?'var(--accent2)':'var(--amber)',fontSize:9}}>{(u.autodial_role||u.role||'admin').toUpperCase()}</span>
                {u.approved?<span className="pill" style={{background:'var(--gdim)',color:'var(--green)',fontSize:9}}>Approved</span>
                :<span className="pill" style={{background:'var(--rdim)',color:'var(--red)',fontSize:9}}>Pending</span>}
              </div>
            </div>
            {!isCreator(u.email)&&<div style={{display:'flex',gap:4,flexShrink:0}}>
              {!u.approved&&<button onClick={async()=>{
                await _SB.from('profiles').update({approved:true}).eq('id',u.id);
                setUsersList(p=>p.map(x=>x.id===u.id?{...x,approved:true}:x));
                toast(`${u.full_name||u.email} approved ✓`);
              }} style={{padding:'5px 10px',borderRadius:6,background:'var(--gdim)',color:'var(--green)',fontSize:10,fontWeight:600}}>Approve</button>}
              {u.approved&&<button onClick={async()=>{
                await _SB.from('profiles').update({approved:false}).eq('id',u.id);
                setUsersList(p=>p.map(x=>x.id===u.id?{...x,approved:false}:x));
                toast(`${u.full_name||u.email} revoked`);
              }} style={{padding:'5px 10px',borderRadius:6,background:'var(--rdim)',color:'var(--red)',fontSize:10,fontWeight:600}}>Revoke</button>}
            </div>}
          </div>
        ))}
        {usersList.length===0&&!usersLoading&&<p style={{fontSize:11,color:'var(--text3)',textAlign:'center',padding:10}}>Tap "Load Users" to see accounts</p>}
      </div>}

      {role==='main'&&<div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:10,color:'var(--gold)'}}>💰 Pay & Session Config</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
          {[['Bronze $/hr',0],['Silver $/hr',1],['Gold $/hr',2]].map(([l,i])=>
            <div key={i}><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:3}}>{l}</label>
            <input type="number" value={cfg.payRates[i]} onChange={e=>{const r=[...cfg.payRates];r[i]=parseFloat(e.target.value)||0;setCfg(s=>({...s,payRates:r}))}} style={{fontSize:13,textAlign:'center'}}/></div>
          )}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:3}}>Session (hrs)</label><input type="number" value={cfg.sessionDur} onChange={e=>setCfg(s=>({...s,sessionDur:parseFloat(e.target.value)||5}))} style={{fontSize:13,textAlign:'center'}}/></div>
          <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:3}}>M (full sess)</label><input type="number" value={cfg.mThresh} onChange={e=>setCfg(s=>({...s,mThresh:parseInt(e.target.value)||2}))} style={{fontSize:13,textAlign:'center'}}/></div>
          <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:3}}>N (1.5× bonus)</label><input type="number" value={cfg.nThresh} onChange={e=>setCfg(s=>({...s,nThresh:parseInt(e.target.value)||4}))} style={{fontSize:13,textAlign:'center'}}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:10}}>
          <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:3}}>Billing Cycle (days)</label>
            <select value={cfg.billingDays} onChange={e=>setCfg(s=>({...s,billingDays:parseInt(e.target.value)}))} style={{fontSize:13,textAlign:'center'}}>
              <option value={7}>Weekly (7)</option><option value={14}>Bi-weekly (14)</option><option value={28}>Monthly (28)</option><option value={30}>Monthly (30)</option>
            </select></div>
          <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:3}}>Met Incentive ($)</label><input type="number" value={cfg.metIncentive} onChange={e=>setCfg(s=>({...s,metIncentive:parseFloat(e.target.value)||0}))} style={{fontSize:13,textAlign:'center'}}/></div>
        </div>
        <p style={{margin:'8px 0 0',fontSize:10,color:'var(--text3)'}}>These are defaults. Customize per-admin below.</p>
      </div>}

      {/* Per-Admin Config */}
      {role==='main'&&<div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:10,color:'var(--accent2)'}}>👥 Admin Pay (Per-Person)</h3>
        <p style={{fontSize:11,color:'var(--text3)',marginBottom:10}}>Override defaults for individual admins. Admins without custom config use the defaults above.</p>
        
        {/* Add admin */}
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <input value={newAdminEmail} onChange={e=>setNewAdminEmail(e.target.value)} placeholder="Admin email" style={{flex:1,fontSize:13}}/>
          <button onClick={()=>{
            const email=newAdminEmail.trim().toLowerCase();
            if(!email||!email.includes('@')){toast('Enter valid email','err');return}
            if(adminConfigs[email]){toast('Already exists','err');return}
            setAdminConfigs(p=>({...p,[email]:{payRates:[...cfg.payRates],sessionDur:cfg.sessionDur,mThresh:cfg.mThresh,nThresh:cfg.nThresh}}));
            setNewAdminEmail('');toast(`Added ${email}`);
          }} style={{padding:'0 16px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600,flexShrink:0}}>Add</button>
        </div>

        {/* Admin list */}
        {Object.entries(adminConfigs).map(([email,ac])=>(
          <div key={email} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:10,padding:12,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <p style={{margin:0,fontSize:13,fontWeight:600,color:'#f1f5f9'}}>{email}</p>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>setEditingAdmin(editingAdmin===email?null:email)} style={{padding:'4px 10px',borderRadius:6,background:'var(--adim)',color:'var(--accent2)',fontSize:10,fontWeight:600}}>{editingAdmin===email?'Close':'Edit'}</button>
                <button onClick={()=>{const c={...adminConfigs};delete c[email];setAdminConfigs(c);toast(`Removed ${email}`)}} style={{padding:'4px 10px',borderRadius:6,background:'var(--rdim)',color:'var(--red)',fontSize:10,fontWeight:600}}>×</button>
              </div>
            </div>
            
            {/* Summary row */}
            <div style={{display:'flex',gap:8,fontSize:10,color:'var(--text3)',flexWrap:'wrap'}}>
              <span>💰 ${ac.payRates[0]}/${ac.payRates[1]}/${ac.payRates[2]}</span>
              <span>⏱ {ac.sessionDur}h</span>
              <span>M:{ac.mThresh}</span>
              <span>N:{ac.nThresh}</span>
            </div>
            
            {/* Edit form */}
            {editingAdmin===email&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8}}>
                {[['🥉 $/hr',0],['🥈 $/hr',1],['🥇 $/hr',2]].map(([l,i])=>
                  <div key={i}><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:2}}>{l}</label>
                  <input type="number" value={ac.payRates[i]} onChange={e=>{const r=[...ac.payRates];r[i]=parseFloat(e.target.value)||0;setAdminConfigs(p=>({...p,[email]:{...p[email],payRates:r}}))}} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
                )}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:2}}>Session (hrs)</label>
                <input type="number" value={ac.sessionDur} onChange={e=>setAdminConfigs(p=>({...p,[email]:{...p[email],sessionDur:parseFloat(e.target.value)||5}}))} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
                <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:2}}>M (full)</label>
                <input type="number" value={ac.mThresh} onChange={e=>setAdminConfigs(p=>({...p,[email]:{...p[email],mThresh:parseInt(e.target.value)||2}}))} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
                <div><label style={{fontSize:9,color:'var(--text3)',fontWeight:600,display:'block',marginBottom:2}}>N (1.5×)</label>
                <input type="number" value={ac.nThresh} onChange={e=>setAdminConfigs(p=>({...p,[email]:{...p[email],nThresh:parseInt(e.target.value)||4}}))} style={{fontSize:12,textAlign:'center',padding:'8px'}}/></div>
              </div>
            </div>}
          </div>
        ))}
        {Object.keys(adminConfigs).length===0&&<p style={{fontSize:11,color:'var(--text3)',textAlign:'center',padding:10}}>No custom admin configs. All admins use defaults.</p>}
      </div>}

      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:6,color:'#f1f5f9'}}>Google</h3>
        <p style={{fontSize:11,color:gOk?'var(--green)':'var(--text3)',fontWeight:600,marginBottom:8}}>{gOk?'✓ Connected':'Not connected'}</p>
        <button onClick={connectG} style={{padding:'9px 16px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>
          {gOk?'Reconnect':'Connect Google'}
        </button>
      </div>
      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:6,color:'#4285f4'}}>🔵 Gemini AI (Smart Sheet Analysis)</h3>
        <p style={{fontSize:11,color:'var(--text3)',marginBottom:8,lineHeight:1.5}}>Analyses messy sheets in 1 API call per import. Auto-detects columns, reads free-text statuses. Free — 1500 req/day.</p>
        <input value={localStorage.getItem('autodial_gemini')||''} onChange={e=>{localStorage.setItem('autodial_gemini',e.target.value.trim())}} placeholder="Paste Gemini API key (AIza…)" className="mono" style={{fontSize:12,marginBottom:8}}/>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{const k=localStorage.getItem('autodial_gemini');if(!k||!k.startsWith('AIza')){toast('Key should start with AIza…','err');return}toast('Gemini key saved')}} style={{padding:'8px 14px',borderRadius:8,background:'var(--adim)',color:'var(--accent2)',fontSize:12,fontWeight:600}}>Save</button>
          <button onClick={async()=>{const k=geminiKey();if(!k){toast('No key set','err');return}try{const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+k,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Say hello in 3 words'}]}],generationConfig:{maxOutputTokens:20}})});const d=await r.json();if(d.error)toast(d.error.message,'err');else toast('✓ Gemini working!')}catch(e){toast(e.message,'err')}}} style={{padding:'8px 14px',borderRadius:8,background:'var(--bg3)',color:'var(--text2)',fontSize:12,fontWeight:600,border:'1px solid var(--border)'}}>Test</button>
        </div>
        <p style={{margin:'6px 0 0',fontSize:10,color:'var(--text3)'}}>Get free: <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:'#4285f4'}}>aistudio.google.com</a> → Create key. Same key as PolicyLens works.</p>
      </div>
      <button onClick={()=>{if(confirm('Sign out?'))authLogout()}} style={{width:'100%',padding:'12px',borderRadius:10,background:'transparent',border:'1px solid var(--border2)',color:'var(--text3)',fontSize:13}}>Sign Out</button>
    </div>}

    {/* Modals */}
    {showCb&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowCb(false)}><div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,background:'var(--bg2)',borderRadius:'18px 18px 0 0',padding:'20px 20px 28px',border:'1px solid var(--border2)'}}>
      <h3 style={{margin:'0 0 12px',fontSize:17,fontWeight:700,color:'#f1f5f9'}}>Callback</h3>
      <input type="date" value={cbDate} onChange={e=>setCbDate(e.target.value)} style={{marginBottom:8,colorScheme:'dark'}}/>
      <input type="time" value={cbTime} onChange={e=>setCbTime(e.target.value)} style={{marginBottom:14,colorScheme:'dark'}}/>
      <button onClick={()=>{if(!cbDate||!cbTime)return;handleOutcome('cb',{cbDate,cbTime});setShowCb(false)}} style={{width:'100%',padding:'13px',borderRadius:10,background:'linear-gradient(135deg,var(--blue),#2563eb)',color:'#fff',fontSize:14,fontWeight:700}}>📅 Set CB</button>
    </div></div>}

    {showAppt&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setShowAppt(false)}><div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,background:'var(--bg2)',borderRadius:'18px 18px 0 0',padding:'20px 20px 28px',border:'1px solid var(--border2)'}}>
      <h3 style={{margin:'0 0 6px',fontSize:17,fontWeight:700,color:'var(--green)'}}>✓ Appointment Set!</h3>
      <p style={{margin:'0 0 12px',fontSize:12,color:'var(--text3)'}}>Add to Google Calendar?</p>
      <input type="date" value={apptDate} onChange={e=>setApptDate(e.target.value)} style={{marginBottom:8,colorScheme:'dark'}}/>
      <input type="time" value={apptTime} onChange={e=>setApptTime(e.target.value)} style={{marginBottom:8,colorScheme:'dark'}}/>
      <input value={apptInvite} onChange={e=>setApptInvite(e.target.value)} placeholder="Invite emails (comma separated)" style={{marginBottom:12}}/>
      <div style={{display:'flex',gap:8}}>
        <button onClick={async()=>{if(!apptDate||!apptTime)return;try{const s=new Date(`${apptDate}T${apptTime}`);const e=new Date(s.getTime()+3600000);const att=apptInvite?apptInvite.split(',').map(s=>s.trim()).filter(Boolean):[];await gCal.create(`Appt: ${cur?.name||'Lead'}`,`Phone: ${cur?.phone||''}\nEmail: ${cur?.email||''}`,s.toISOString(),e.toISOString(),att);toast('Calendar event created!');setShowAppt(false)}catch(e){toast(e.message,'err')}}} style={{flex:1,padding:'13px',borderRadius:10,background:'linear-gradient(135deg,var(--green),#059669)',color:'#fff',fontSize:14,fontWeight:700}}>📅 Create</button>
        <button onClick={()=>setShowAppt(false)} style={{padding:'13px 20px',borderRadius:10,background:'var(--bg3)',color:'var(--text3)',fontSize:14}}>Skip</button>
      </div>
    </div></div>}

    {detailLead&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',zIndex:100,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={()=>setDetailId(null)}><div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:480,maxHeight:'80vh',overflow:'auto',background:'var(--bg2)',borderRadius:'18px 18px 0 0',padding:'20px 20px 28px',border:'1px solid var(--border2)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <div style={{width:38,height:38,borderRadius:10,background:ST[detailLead.status]?.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:ST[detailLead.status]?.c}}>{detailLead.name.charAt(0)}</div>
        <div style={{flex:1}}><h3 style={{margin:0,fontSize:16,fontWeight:700,color:'#f1f5f9'}}>{detailLead.name}</h3><Badge s={detailLead.status} np={detailLead.npCount} cbh={detailLead.cbHistory}/></div>
        <button onClick={()=>setDetailId(null)} style={{background:'none',color:'var(--text3)',fontSize:20}}>×</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:10}}>
        {[['Phone',detailLead.phone],['Email',detailLead.email],['Age',detailLead.age],['Race',detailLead.race],['Income',detailLead.income],['Called',detailLead.calledAt]].filter(([,v])=>v).map(([k,v])=>
        <div key={k} style={{padding:'6px 8px',borderRadius:6,background:'var(--bg3)'}}><p style={{margin:0,fontSize:9,color:'var(--text3)',fontWeight:600}}>{k}</p><p style={{margin:'1px 0 0',fontSize:11,color:'var(--text)'}}>{v}</p></div>)}
      </div>
      {detailLead.notes&&<p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>{detailLead.notes}</p>}
      <a href={`tel:${detailLead.phone.replace(/[^+\d]/g,'')}`} style={{display:'block',textAlign:'center',padding:'11px',borderRadius:10,background:'linear-gradient(135deg,var(--accent),#8b5cf6)',color:'#fff',fontSize:14,fontWeight:700,textDecoration:'none'}}>📞 Call</a>
    </div></div>}
  </div>);
}

function initApp(){ReactDOM.createRoot(document.getElementById('root')).render(<App/>)}
window.initApp=initApp;
</script>
</body>
</html>
